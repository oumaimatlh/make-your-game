<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="maze.css">
    <title>Document</title>
</head>

<body>

<script type="module" src="maze.js"></script>
<script type="module" src="gameLoop.js"></script>
<div id="game-header">
    <!-- Score -->
    <div class="hud-block score-block">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score-value">0</span>
    </div>

    <!-- Lives -->
    <div class="hud-block" id="lives-block">
        <span class="hud-label">LIVES</span>
        <div id="lives-value">
            <span class="life-icon"><svg viewBox="0 0 13 13"><path d="M4,0 H9 V1 H11 V2 H12 V4 H11 V5 H9 V6 H6 V7 H9 V8 H11 V9 H12 V11 H11 V12 H9 V13 H4 V12 H2 V11 H1 V9 H0 V4 H1 V2 H2 V1 H4 Z" fill="yellow" /></svg></span>
            <span class="life-icon"><svg viewBox="0 0 13 13"><path d="M4,0 H9 V1 H11 V2 H12 V4 H11 V5 H9 V6 H6 V7 H9 V8 H11 V9 H12 V11 H11 V12 H9 V13 H4 V12 H2 V11 H1 V9 H0 V4 H1 V2 H2 V1 H4 Z" fill="yellow" /></svg></span>
            <span class="life-icon"><svg viewBox="0 0 13 13"><path d="M4,0 H9 V1 H11 V2 H12 V4 H11 V5 H9 V6 H6 V7 H9 V8 H11 V9 H12 V11 H11 V12 H9 V13 H4 V12 H2 V11 H1 V9 H0 V4 H1 V2 H2 V1 H4 Z" fill="yellow" /></svg></span>
        </div>
    </div>

    <button id="pause-btn">PAUSE</button>
</div>
<div id="maze"></div>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<div id="start-screen" class="overlay">
    <h1 class="pacman-title">PAC-MAN</h1>
    <button id="play-btn">PLAY</button>
</div>
<div id="pause-screen" class="overlay hidden">
    <button id="continue-btn">CONTINUE</button>
</div>

</body>

</html>
